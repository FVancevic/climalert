spring.application.name=climalert

# ============================================================
# WeatherAPI
# ============================================================
weatherapi.base-url=https://api.weatherapi.com/v1
weatherapi.api-key=53abd58921d9434598c155420260707

# ============================================================
# Configuración de Climalert
# ============================================================
# Ubicación fija a consultar
climalert.location=Buenos Aires

# Cooldown entre alertas (minutos) — evita spam de correos
climalert.alert.cooldown-minutes=5

# Scheduler: fetch cada 5 minutos (300000 ms), alertas cada 1 minuto (60000 ms)
climalert.scheduler.fetch-rate-ms=300000
climalert.scheduler.alert-rate-ms=60000

# ============================================================
# Correo electrónico (Gmail con App Password)
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=TU_EMAIL@gmail.com
spring.mail.password=TU_APP_PASSWORD_AQUI
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Remitente y destinatarios
climalert.email.from=TU_EMAIL@gmail.com
climalert.email.recipients=admin@clima.com,emergencias@clima.com,meteorologia@clima.com

# ============================================================
# Base de datos H2 en memoria (registro histórico)
# ============================================================
spring.datasource.url=jdbc:h2:mem:climalertdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
# Logging
# ============================================================
logging.level.ar.edu.utn.frba.ddsi.climalert=INFO
logging.level.org.springframework.scheduling=INFO
