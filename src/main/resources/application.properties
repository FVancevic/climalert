# ============================================================
# Configuración de Climalert
# ============================================================
# Ubicación fija a consultar
climalert.location=Buenos Aires

# Cooldown entre alertas (minutos) — evita spam de correos
climalert.alert.cooldown-minutes=5

# Scheduler: fetch cada 5 minutos (300000 ms), alertas cada 1 minuto (60000 ms)
climalert.scheduler.fetch-rate-ms=300000
climalert.scheduler.alert-rate-ms=60000

